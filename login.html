<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OE Tattoo Tools</title>
    <meta name="description" content="Login to access the OE Tattoo tools section.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>OE Tattoo</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="flash.html">Flash</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="events.html">Events</a>
            <a href="tools.html">Tools</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <section class="login-card">
            <h2>Tools Login</h2>
            <p>Enter the studio access code to use the Tools and Numerology app.</p>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-field">
                    <label for="password">Access Code</label>
                    <input type="password" id="password" name="password" placeholder="Enter access code" required>
                </div>
                <button type="submit" class="button-link">Log In</button>
                <p id="loginError" class="login-error"></p>
            </form>
            <p class="login-note">For demo access, use the code: <strong>STUDIO2026</strong></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 OE Tattoo</p>
    </footer>
    <script src="login.js"></script>
</body>
</html>
