<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OE Music - OE Tattoo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="index.html" class="nav-logo">OE TATTOO</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="tools.html">Tools</a></li>
                    <li><a href="chat.html">Chat</a></li>
                    <li><a href="songs.html" class="active">Song Library</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>OE Music</h1>
            <p>personal songs for demo</p>
        </div>

        <div class="song-library">
            <div class="library-controls">
                <h2>My Music Collection</h2>
            </div>

            <div class="songs-container">
                <div id="songsList" class="songs-list">
                    <div class="loading-message">
                        <p>Sign in with Google to access your song library</p>
                    </div>
                </div>
            </div>

            <div class="now-playing">
                <div id="nowPlaying" class="now-playing-info">
                    <span id="currentSong">No song selected</span>
                    <div id="progressContainer" class="progress-container" style="display: none;">
                        <div id="progressBar" class="progress-bar"></div>
                        <div class="progress-times">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="player-controls">
                    <button id="prevBtn" class="player-btn">⏮</button>
                    <button id="playPauseBtn" class="player-btn">▶</button>
                    <button id="nextBtn" class="player-btn">⏭</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 OE Tattoo</p>
    </footer>

    <audio id="audioPlayer" preload="none"></audio>

    <script src="script.js"></script>
    <script src="songs.js"></script>
</body>
</html>
